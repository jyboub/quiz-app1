<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz ISTQB CT-AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="quiz">

    <div class="quiz__header">
      <p id="progression" class="quiz__info"></p>
      <p id="score" class="quiz__info"></p>
    </div>

    <h1 id="question" class="quiz__question"></h1>

    <div id="choices" class="quiz__choices"></div>

    <p
      id="feedback"
      class="quiz__feedback"
      role="status"
      aria-live="polite"
    ></p>

    <div id="actions"></div>

    <section id="result" class="quiz__result hidden">

      <h2>🏆 Résultat du Quiz</h2>

      <p id="finalScore"></p>

      <button id="restartButton">
        Recommencer
      </button>

    </section>

  </main>

  <script src="script.js"></script>

</body>
</html>
