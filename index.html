<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Quiz IA</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<main class="app">
  <div class="top-bar">
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
    <div class="url-bar"></div>
  </div>

  <section class="quiz-header">
    <div id="progression">Question 1 / 5</div>
    <div id="score">Score : 0 / 5</div>
  </section>

  <section class="question-box">
    <h2 id="question">Chargement de la question...</h2>
  </section>

  <section id="answers" class="answers"></section>

  <p id="feedback"></p>
  <p id="error"></p>

  <button id="nextBtn" onclick="nextQuestion()" disabled>
    Suivant →
  </button>
</main>

<script src="script.js"></script>
</body>
</html>
