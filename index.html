<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Quiz</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="app">
    <div class="top-bar">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <div class="url-bar"></div>
    </div>

    <section class="quiz-header">
      <div id="progression">Question 1 / 3</div>
      <div id="score">Score : 0 / 3</div>
    </section>

    <section class="question-box">
      <h2 id="question">Question</h2>
    </section>

    <section id="answers" class="answers"></section>

    <p id="feedback"></p>

    <button id="nextBtn" onclick="nextQuestion()" disabled>
      Suivant →
    </button>
  </main>

  <script src="script.js"></script>
</body>
</html>
